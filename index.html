function Confirm({title,msg,onOk,onClose,danger}){

// ─── TASK ROW ───
function TR({task,onClick}){const ph=PHASES_DATA.find(p=>p.num===task.phase);return<div onClick={onClick} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"#111114",borderRadius:10,marginBottom:4,border:"1px solid rgba(255,255,255,0.06)",cursor:"pointer",transition:"all .1s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.06)"}>

</div>}

// ─── MAIN ───
function App(){

  if(!data)return null;

  const addMtg=(m)=>{setData(p=>({...p,meetings:[...(p.meetings||[]),{id:Date.now().toString(),...m,createdBy:user.id}]}));act("meeting",`scheduled "${m.title}"`);setModal(null)};
  const delMtg=(id)=>{const m=(data.meetings||[]).find(x=>x.id===id);setData(p=>({...p,meetings:p.meetings.filter(x=>x.id!==id)}));act("meeting",`deleted "${m?.title}"`);setModal(null)};

        {cols.map(col=>{const items=ft.filter(t=>t.status===col.id);return<div key={col.id} onDragOver={e=>{e.preventDefault();setDragOver(col.id)}} onDragLeave={()=>setDragOver(null)} onDrop={()=>drop(col.id)} style={{background:dragOver===col.id?"rgba(255,255,255,0.03)":"#0c0c0f",borderRadius:14,padding:12,border:dragOver===col.id?`1.5px dashed ${col.c}50`:"1px solid rgba(255,255,255,0.06)",overflowY:"auto",transition:"all .15s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"0 4px"}}><div style={{width:8,height:8,borderRadius:"50%",background:col.c}}/><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"#888"}}>{col.label}</div><div style={{fontSize:11,color:"#555",marginLeft:"auto"}}>{items.length}</div></div>
          {items.map(t=>{const ph=PHASES_DATA.find(p=>p.num===t.phase);return<div key={t.id} draggable onDragStart={()=>setDragId(t.id)} onDragEnd={()=>{setDragId(null);setDragOver(null)}} onClick={()=>openTask(t)} style={{background:dragId===t.id?"rgba(255,255,255,0.08)":"#111114",borderRadius:10,padding:"12px 14px",marginBottom:6,border:"1px solid rgba(255,255,255,0.06)",cursor:"grab",transition:"all .1s",opacity:dragId===t.id?.5:1}} onMouseEnter={e=>{if(dragId)return;e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"}} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.06)"}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:8,lineHeight:1.4}}>{t.title}</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:`${ph?.color}15`,color:ph?.color,fontWeight:600}}>P{t.phase}</span>{t.priority==="high"&&<span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"rgba(231,76,60,0.1)",color:"#E74C3C",fontWeight:600}}>HIGH</span>}<div style={{marginLeft:"auto"}}><Av id={t.assignee} sz={18}/></div></div>
          </div>})}
        </div>})}
      </div>
    </div>;
  };

  const calView=()=>{
    const[off,setOff]=useState(0);const now=new Date(2025,4+off,1);const yr=now.getFullYear(),mo=now.getMonth(),dim=new Date(yr,mo+1,0).getDate(),sd=new Date(yr,mo,1).getDay();
    const mM={},mtM={};MS.forEach(m=>{const d=new Date(m.date);if(d.getFullYear()===yr&&d.getMonth()===mo)mM[d.getDate()]=m});(data.meetings||[]).forEach(m=>{const d=new Date(m.date);if(d.getFullYear()===yr&&d.getMonth()===mo){const dy=d.getDate();if(!mtM[dy])mtM[dy]=[];mtM[dy].push(m)}});
    const cells=[];for(let i=0;i<sd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
    return<div style={{padding:"28px 32px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}><div style={{fontSize:22,fontWeight:700,letterSpacing:"-0.02em"}}>Calendar</div><button onClick={()=>setModal({type:"mtg"})} style={{...btn,display:"flex",alignItems:"center",gap:6,padding:"8px 14px",fontSize:12}}><I n="plus" s={13} c="#fff"/>Add meeting</button></div>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}><button onClick={()=>setOff(p=>p-1)} style={ghost}>Prev</button><div style={{fontSize:16,fontWeight:700,minWidth:160,textAlign:"center"}}>{now.toLocaleDateString("en",{month:"long",year:"numeric"})}</div><button onClick={()=>setOff(p=>p+1)} style={ghost}>Next</button></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} style={{padding:8,textAlign:"center",fontSize:10,color:"#555",fontWeight:600,textTransform:"uppercase"}}>{d}</div>)}
        {cells.map((d,i)=><div key={i} style={{minHeight:80,background:d?"#111114":"transparent",borderRadius:8,padding:d?"6px 8px":0,border:d?"1px solid rgba(255,255,255,0.03)":"none"}}>{d&&<><div style={{fontSize:12,fontWeight:500,color:"#888",marginBottom:4}}>{d}</div>{mM[d]&&<div style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"rgba(231,76,60,0.12)",color:"#E74C3C",fontWeight:600,marginBottom:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{mM[d].title}</div>}{mtM[d]?.map((m,j)=><div key={j} style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"rgba(108,92,231,0.12)",color:"#6C5CE7",fontWeight:500,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.title}</div>)}</>}</div>)}
      </div>
      <div style={{marginTop:24}}><div style={{fontSize:13,fontWeight:600,color:"#888",marginBottom:10}}>Academic milestones</div>{MS.map((m,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}><div style={{fontSize:11,color:"#E74C3C",fontWeight:600,minWidth:70}}>{new Date(m.date).toLocaleDateString("en",{day:"numeric",month:"short"})}</div><div style={{fontSize:12,fontWeight:500}}>{m.title}</div><div style={{fontSize:11,color:"#555"}}>{m.desc}</div></div>)}</div>
    </div>;
  };

  const teamView=()=><div style={{padding:"28px 32px",maxWidth:800}}>
    <div style={{fontSize:22,fontWeight:700,marginBottom:4,letterSpacing:"-0.02em"}}>Team workload</div><div style={{fontSize:13,color:"#888",marginBottom:24}}>Task distribution across phases</div>
    {TEAM.map(m=>{const ts=data.tasks.filter(t=>t.assignee===m.id||t.assignee==="All");const dn=ts.filter(t=>t.status==="done").length,ip=ts.filter(t=>t.status==="in-progress").length,td=ts.filter(t=>t.status==="todo").length;const pc=ts.length?Math.round((dn/ts.length)*100):0;
      return<div key={m.id} style={{background:"#111114",borderRadius:14,padding:20,marginBottom:10,border:"1px solid rgba(255,255,255,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}><Av id={m.id} sz={40}/><div><div style={{fontSize:15,fontWeight:700}}>{m.name}</div><div style={{fontSize:11,color:"#888"}}>{m.role}</div></div><div style={{marginLeft:"auto",textAlign:"right"}}><div style={{fontSize:20,fontWeight:700,color:m.color}}>{pc}%</div><div style={{fontSize:10,color:"#555"}}>{dn}/{ts.length}</div></div></div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>{[["To do",td,"#555"],["In progress",ip,"#FDCB6E"],["Done",dn,"#00B894"]].map(([l,v,c])=><span key={l} style={{fontSize:10,padding:"3px 8px",borderRadius:5,background:`${c}12`,color:c}}>{l}: {v}</span>)}</div>
        <div style={{height:5,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden",display:"flex"}}><div style={{width:`${ts.length?(dn/ts.length)*100:0}%`,background:"#00B894"}}/><div style={{width:`${ts.length?(ip/ts.length)*100:0}%`,background:"#FDCB6E"}}/></div>
      </div>})}
    <div style={{marginTop:28,fontSize:14,fontWeight:700,marginBottom:12}}>RACI matrix</div>
    <div style={{background:"#111114",borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase"}}>Phase</div>{TEAM.map(m=><div key={m.id} style={{fontSize:10,fontWeight:700,color:m.color,textTransform:"uppercase",textAlign:"center"}}>{m.name}</div>)}</div>
      {[["P1: Foundation","A, R","C, R","R","A, R"],["P2: Backend","A","R","I","C"],["P3: Admin Dashboard","A","R","C","R"],["P4: Mobile App","A","R","C","C"],["P5: Testing & QA","A, R","R","R","R"],["P6: Final Deliverables","A, R","R","R","R"]].map((r,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",padding:"10px 14px",borderBottom:i<5?"1px solid rgba(255,255,255,0.03)":"none"}}><div style={{fontSize:12,fontWeight:500}}>{r[0]}</div>{r.slice(1).map((v,j)=><div key={j} style={{fontSize:11,color:"#888",textAlign:"center"}}>{v}</div>)}</div>)}
    </div>
  </div>;

  const docsView=()=>{const all=data.documents,comp=all.filter(d=>d.status==="complete").length,pc=all.length?Math.round((comp/all.length)*100):0;
    return<div style={{padding:"28px 32px",maxWidth:900}}>
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:24}}><div><div style={{fontSize:22,fontWeight:700,letterSpacing:"-0.02em"}}>Document hub</div><div style={{fontSize:13,color:"#888",marginTop:2}}>Click to cycle status · {all.length} documents</div></div><div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:700,color:"#00B894"}}>{pc}%</div><div style={{fontSize:10,color:"#555"}}>{comp}/{all.length}</div></div></div>
      {PHASES_DATA.map(ph=>{const ds=all.filter(d=>d.phase===ph.num);if(!ds.length)return null;return<div key={ph.id} style={{marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:20,height:20,borderRadius:5,background:`${ph.color}20`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:ph.color}}>{ph.num}</div><div style={{fontSize:13,fontWeight:700}}>{ph.title}</div><div style={{fontSize:10,color:"#555",marginLeft:"auto"}}>{ds.filter(d=>d.status==="complete").length}/{ds.length}</div></div>
        {ds.map(d=><div key={d.id} onClick={()=>{const nx=d.status==="not-started"?"in-progress":d.status==="in-progress"?"review":d.status==="review"?"complete":"not-started";uD(d.id,{status:nx});act("document",`updated "${d.name}" to ${nx}`)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#111114",borderRadius:10,marginBottom:4,border:"1px solid rgba(255,255,255,0.06)",cursor:"pointer",transition:"all .1s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.12)"} onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(255,255,255,0.06)"}><I n="doc" s={14} c={dsC[d.status]}/><div style={{flex:1,fontSize:12}}>{d.name}</div><span style={{fontSize:9,padding:"3px 8px",borderRadius:5,background:`${dsC[d.status]}18`,color:dsC[d.status],fontWeight:600}}>{dsL[d.status]}</span></div>)}
      </div>})}
    </div>;
  };

  const mtgView=()=>{const ms=data.meetings||[];const up=ms.filter(m=>new Date(m.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));const past=ms.filter(m=>new Date(m.date)<new Date()).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const MCard=({m,past:p})=><div style={{background:"#111114",borderRadius:12,padding:16,marginBottom:8,border:"1px solid rgba(255,255,255,0.06)",opacity:p?.5:1}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:600}}>{m.title}</div><div style={{fontSize:11,color:"#888",marginTop:4}}>{new Date(m.date).toLocaleDateString("en",{weekday:"short",day:"numeric",month:"short"})}{m.time&&` at ${m.time}`}</div></div><button onClick={()=>setModal({type:"del",id:m.id,name:m.title})} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:.4}}><I n="trash" s={14} c="#E74C3C"/></button></div>
      {m.attendees?.length>0&&<div style={{display:"flex",gap:4,marginTop:10}}>{m.attendees.map(a=><Av key={a} id={a} sz={22}/>)}</div>}
      {m.notes&&<div style={{fontSize:11,color:"#555",marginTop:8,lineHeight:1.6}}>{m.notes}</div>}
    </div>;
    return<div style={{padding:"28px 32px",maxWidth:800}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}><div><div style={{fontSize:22,fontWeight:700,letterSpacing:"-0.02em"}}>Meetings</div><div style={{fontSize:13,color:"#888",marginTop:2}}>Schedule and track team meetings</div></div><button onClick={()=>setModal({type:"mtg"})} style={{...btn,display:"flex",alignItems:"center",gap:6}}><I n="plus" s={14} c="#fff"/>New meeting</button></div>
      {up.length>0&&<div style={{fontSize:11,fontWeight:600,color:"#00B894",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Upcoming ({up.length})</div>}{up.map(m=><MCard key={m.id} m={m}/>)}
      {past.length>0&&<div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:8,marginTop:20,textTransform:"uppercase",letterSpacing:"0.06em"}}>Past ({past.length})</div>}{past.map(m=><MCard key={m.id} m={m} past/>)}
      {ms.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#555"}}><div style={{fontSize:14,marginBottom:4}}>No meetings yet</div><div style={{fontSize:12}}>Click "New meeting" to schedule one</div></div>}
    </div>;
  };

  const actView=()=>{const items=data.activity||[];return<div style={{padding:"28px 32px",maxWidth:700}}>
    <div style={{fontSize:22,fontWeight:700,marginBottom:4,letterSpacing:"-0.02em"}}>Activity log</div><div style={{fontSize:13,color:"#888",marginBottom:24}}>Recent actions across the team</div>
    {items.length===0&&<div style={{textAlign:"center",padding:"60px 0",color:"#555"}}><div style={{fontSize:14}}>No activity yet</div></div>}
    {items.map(a=>{const m=TEAM.find(t=>t.id===a.user);const df=Date.now()-new Date(a.time).getTime(),mn=Math.floor(df/60000);const ago=mn<1?"just now":mn<60?`${mn}m ago`:mn<1440?`${Math.floor(mn/60)}h ago`:`${Math.floor(mn/1440)}d ago`;
      return<div key={a.id} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}><Av id={a.user} sz={28}/><div><div style={{fontSize:12}}><span style={{fontWeight:600}}>{m?.name||"?"}</span> <span style={{color:"#888"}}>{a.detail}</span></div><div style={{fontSize:10,color:"#555",marginTop:3}}>{ago}</div></div></div>})}
  </div>};

  return<div style={{display:"flex",height:"100vh",background:"#0a0a0c",fontFamily:"'Plus Jakarta Sans',sans-serif",color:"#e8e6e1"}}>
    <div style={{width:220,background:"#111114",borderRight:"1px solid rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"20px 16px 12px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:15,fontWeight:700,letterSpacing:"-0.02em",color:"#00B894"}}>SchoolBoyRugga</div><div style={{fontSize:11,color:"#555",marginTop:2}}>Project #29 — PM Hub</div></div>
      <div style={{flex:1,padding:8,overflowY:"auto"}}>{nav.map(n=><button key={n.id} onClick={()=>{setView(n.id);setSp(null)}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 12px",border:"none",borderRadius:8,background:view===n.id?"rgba(255,255,255,0.07)":"transparent",color:view===n.id?"#fff":"#888",fontSize:13,fontWeight:view===n.id?600:400,cursor:"pointer",transition:"all .15s",textAlign:"left",fontFamily:"inherit"}}><I n={n.icon} s={15} c={view===n.id?"#00B894":"#555"}/>{n.label}</button>)}</div>
      <div style={{padding:"8px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
        <button onClick={()=>setModal({type:"reset"})} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 12px",border:"none",borderRadius:6,background:"transparent",color:"#555",fontSize:11,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>Reset data</button>
        <button onClick={()=>setUser(null)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 12px",border:"none",borderRadius:6,background:"transparent",color:"#555",fontSize:11,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}><I n="logout" s={13} c="#555"/>Sign out ({user.name})</button>
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      {view==="dashboard"&&dashView()}
      {view==="phases"&&phasesView()}
      {view==="kanban"&&kanbanView()}
      {view==="calendar"&&calView()}
      {view==="team"&&teamView()}
      {view==="documents"&&docsView()}
      {view==="meetings"&&mtgView()}
      {view==="activity"&&actView()}
    </div>
    {modal?.type==="mtg"&&<MeetingForm onSave={addMtg} onClose={()=>setModal(null)} init={modal.init}/>}
    {modal?.type==="task"&&<TaskDetail task={modal.task} onClose={()=>setModal(null)} onUpdate={uT} onAct={act}/>}
    {modal?.type==="add"&&<AddTask onSave={addNewTask} onClose={()=>setModal(null)}/>}
    {modal?.type==="reset"&&<Confirm title="Reset all data?" msg="This resets all task statuses, documents, meetings, and activity to defaults. Can't be undone." danger onOk={()=>{setData(defs());setModal(null)}} onClose={()=>setModal(null)}/>}
    {modal?.type==="del"&&<Confirm title="Delete meeting?" msg={`Delete "${modal.name}"? This can't be undone.`} danger onOk={()=>delMtg(modal.id)} onClose={()=>setModal(null)}/>}
  </div>;
}




ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
